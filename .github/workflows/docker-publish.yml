name: Publicar imagem no Docker Hub

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

env:
  # Repo do Docker Hub = <usuario>/<nome-do-repo-no-github>
  IMAGE_NAME: ${{ (vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME) }}/${{ github.event.repository.name }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pre-pull imagens base (com retry — MCR às vezes retorna 403)
        shell: bash
        run: |
          set -e
          for img in mcr.microsoft.com/dotnet/sdk:9.0-noble mcr.microsoft.com/dotnet/aspnet:9.0-noble; do
            for i in 1 2 3 4 5; do
              if docker pull --platform linux/amd64 "$img"; then
                echo "OK: $img"
                break
              fi
              echo "Tentativa $i falhou pra $img, aguardando $((i*5))s…"
              sleep $((i*5))
            done
          done

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ (vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME) }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Gerar tags e labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build e push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Resumo
        run: |
          echo "### Imagem publicada" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tags:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
