services:
  pca:
    build:
      context: .
      dockerfile: Dockerfile
    image: pca-importer:local
    container_name: pca-importer
    ports:
      - "5062:8080"
    volumes:
      - pca-data:/data
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # Defina pra resetar a senha do admin para "admin123" no próximo start.
      # Remova (ou comente) na próxima subida para o reset não rodar de novo.
      # PCA_RESET_ADMIN: "1"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  pca-data:
