# ========================================================================
#  Stack Portainer — PGC Saúde.Rio · Importador
#
#  Arquitetura: 1 container que serve tanto a API quanto o SPA (mesma porta).
#  Acesso: http://subg:${PGC_PORT}
#  Admin padrão no primeiro start: admin / admin123 (troque a senha após).
#
#  Como subir:
#    1. Stacks → Add stack
#    2. Web editor → cole o conteúdo deste arquivo
#    3. Environment variables (opcional):
#         PGC_PORT       porta de exposição no host (default 8800)
#         PGC_VERSION    tag da imagem (default "latest")
#         PCA_RESET_ADMIN  defina "1" só uma vez para resetar admin
#    4. Deploy the stack
# ========================================================================

services:
  pgc:
    image: windinxd/pgc-importador:${PGC_VERSION:-latest}
    container_name: pgc-importador
    ports:
      - "${PGC_PORT:-8800}:8080"
    volumes:
      - pgc-data:/data
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # PCA_RESET_ADMIN: "1"   # descomente uma vez se esquecer a senha
    restart: unless-stopped
    healthcheck:
      # "/" devolve o index.html do SPA (200). Não usar endpoint autenticado aqui.
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      io.portainer.accesscontrol.public: "false"

volumes:
  pgc-data:
    driver: local
