# ========================================================================
#  Stack Portainer — PGC Saúde.Rio · Importador
#
#  Como subir no Portainer:
#    1. Stacks → Add stack
#    2. Web editor → cole o conteúdo deste arquivo
#    3. Environment variables (opcional):
#         PGC_PORT       porta de exposição no host (default 5062)
#         PGC_VERSION    tag da imagem (default "latest")
#         PCA_RESET_ADMIN  defina "1" só uma vez para resetar admin
#    4. Deploy the stack
#
#  Acesso: http://subg:${PGC_PORT}
#  Admin padrão no primeiro start: admin / admin123 (troque a senha após).
# ========================================================================

services:
  pgc:
    image: windinxd/pgc-importador:${PGC_VERSION:-latest}
    container_name: pgc-importador
    ports:
      - "${PGC_PORT:-5062}:8080"
    volumes:
      - pgc-data:/data
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # PCA_RESET_ADMIN: "1"   # descomente uma vez se esquecer a senha
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/auth/me"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      io.portainer.accesscontrol.public: "false"

volumes:
  pgc-data:
    driver: local
